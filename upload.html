<!DOCTYPE html>
<html>
<head>
<title>Upload Work</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#f5f7fa;
font-family:Arial;
}

.container{
width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

input,
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#f4b400;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Upload Work</h1>

<form
action="/upload"
method="POST"
enctype="multipart/form-data">

<select name="projectName">
<option value="PDF To Word">PDF To Word</option>
<option value="Data Entry">Data Entry</option>
<option value="Document Formatting">Document Formatting</option>
</select>

<input
type="file"
name="workfile"
required>

<button type="submit">
Upload Work
</button>

</form>

</div>

</body>
</html>
