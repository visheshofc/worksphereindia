<!DOCTYPE html>
<html>
<head>
<title>Earnings</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#0b2447;
padding:30px;
}

.sidebar h2{
color:white;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin-bottom:15px;
font-weight:600;
}

.content{
flex:1;
padding:40px;
}

.cards{
display:flex;
flex-direction:row;
gap:20px;
margin-top:30px;
align-items:flex-start;
}

.card{
width:250px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

.card h2{
color:#19376d;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h2>WorkSphere</h2>

<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/tasks">My Tasks</a>
<a href="/upload">Upload Work</a>
<a href="/earnings">Earnings</a>
<a href="/withdraw">Withdraw Funds</a>
<a href="/my-withdrawals">My Withdrawals</a>
<a href="/support">Support</a>

<a href="/logout">
<button style="margin-top:20px;">
Logout
</button>
</a>

</div>

<div class="content">

<h1>My Earnings</h1>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

<div class="card">
<h2 id="wallet">₹0</h2>
<p>Wallet Balance</p>
</div>

<div class="card">
<h2 id="earned">₹0</h2>
<p>Total Earned</p>
</div>

<div class="card">
<h2 id="withdrawn">₹0</h2>
<p>Total Withdrawn</p>
</div>

</div>

</div>

</div>

<script>

fetch("/api/earnings")
.then(res=>res.json())
.then(data=>{

document.getElementById("wallet").innerHTML =
"₹" + data.wallet;

document.getElementById("earned").innerHTML =
"₹" + data.totalEarned;

document.getElementById("withdrawn").innerHTML =
"₹" + data.totalWithdrawn;

});

</script>

</body>
</html>
