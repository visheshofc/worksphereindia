<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.profile-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

h1{
margin-bottom:20px;
color:#19376d;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.box{
background:#f8f9fc;
padding:15px;
border-radius:10px;
}

.label{
font-weight:bold;
color:#19376d;
margin-bottom:5px;
}

.value{
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>My Profile</h1>

<div class="profile-card">

<div class="info">

<div class="box">
<div class="label">Full Name</div>
<div class="value" id="name"></div>
</div>

<div class="box">
<div class="label">Email</div>
<div class="value" id="email"></div>
</div>

<div class="box">
<div class="label">Mobile Number</div>
<div class="value" id="mobile"></div>
</div>

<div class="box">
<div class="label">Aadhaar Number</div>
<div class="value" id="aadhaar"></div>
</div>

<div class="box">
<div class="label">PAN Number</div>
<div class="value" id="pan"></div>
</div>

<div class="box">
<div class="label">UPI ID</div>
<div class="value" id="upi"></div>
</div>

</div>

</div>

</div>

<script>

fetch("/api/profile")
.then(res => res.json())
.then(user => {

document.getElementById("name").innerText =
user.fullname || "";

document.getElementById("email").innerText =
user.email || "";

document.getElementById("mobile").innerText =
user.mobile || "";

document.getElementById("aadhaar").innerText =
user.aadhaar || "";

document.getElementById("pan").innerText =
user.pan || "";

document.getElementById("upi").innerText =
user.upi || "";

});

</script>

</body>
</html>
